# KnonixAI — image-only Docker Compose for self-hosted installs.
#
# This file pulls the prebuilt KnonixAI image from the GitHub Container
# Registry (GHCR). It does NOT build from source, so you do NOT need access to
# the KnonixAI source repository. You only need read (pull) access to the
# container image, granted with a scoped token — see README.md.
#
# Services:
#   knonixai       - Next.js app (KnonixAI)
#   ollama         - Sovereign local LLM runtime (models run inside your boundary)
#   postgres       - Chat history / persistence / auth tables
#   redis          - Caching / rate limiting
#   searxng        - Self-hosted metasearch (data stays in-boundary)
#   supabase-auth  - GoTrue auth server (local + Google/Microsoft sign-in)
#   supabase-kong  - API gateway that fronts GoTrue (NEXT_PUBLIC_SUPABASE_URL)
#
# Authentication is ON by default (ENABLE_AUTH=true). install.sh mints
# KNONIX_AUTH_JWT_SECRET + Supabase anon/service JWTs and starts GoTrue + Kong
# in-boundary. Set ENABLE_AUTH=false only for single-user anonymous mode.
#
# Pin KNONIX_IMAGE_TAG in .env to a specific version (e.g. v1.2.0) for
# reproducible deployments. It defaults to "latest".

name: knonixai
services:
  knonixai:
    image: ghcr.io/knonix/knonixai:${KNONIX_IMAGE_TAG:-latest}
    # "local" tags are built on this host — do not try to pull them from GHCR.
    pull_policy: ${KNONIX_IMAGE_PULL_POLICY:-always}
    restart: unless-stopped
    # Runtime patch for Next.js health check (NEXT_PUBLIC_* empty at image build).
    # No-op once the published image ships the fixed health route. See
    # scripts/knonix-entrypoint.sh and image-build/ for the permanent image fix.
    entrypoint: ["/bin/sh", "/knonix-scripts/knonix-entrypoint.sh"]
    command: ["npx", "next", "start", "-H", "0.0.0.0"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-knonixai}:${POSTGRES_PASSWORD:-knonixai}@postgres:5432/${POSTGRES_DB:-knonixai}${DATABASE_SSL_QUERY:-}
      DATABASE_RESTRICTED_URL: postgresql://${POSTGRES_USER:-knonixai}:${POSTGRES_PASSWORD:-knonixai}@postgres:5432/${POSTGRES_DB:-knonixai}${DATABASE_SSL_QUERY:-}
      # false when POSTGRES_SSL=true (scripts/enable-db-tls.sh sets both)
      DATABASE_SSL_DISABLED: ${DATABASE_SSL_DISABLED:-true}
      ENABLE_AUTH: ${ENABLE_AUTH:-true}
      ANONYMOUS_USER_ID: ${ANONYMOUS_USER_ID:-docker-anonymous}
      # Self-hosted Supabase Auth (only used when ENABLE_AUTH=true). The URL
      # points at the in-boundary Kong gateway below; the keys are the anon /
      # service_role JWTs you mint from KNONIX_AUTH_JWT_SECRET (see
      # .env.local.example). All auth traffic stays inside this compose network.
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
      KNONIX_CLOUD_DEPLOYMENT: 'false'
      # Browser-facing origin (OAuth / connector callbacks). App binds 0.0.0.0:3000.
      KNONIX_DOMAIN: ${KNONIX_DOMAIN:-}
      KNONIX_PUBLIC_URL: ${KNONIX_PUBLIC_URL:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-}
      KNONIX_AUTH_SITE_URL: ${KNONIX_AUTH_SITE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # Low-resource defaults (install.sh overrides from hardware-profile.sh).
      # 3B + short context = interactive on 8–16 GB CPU / small VMs.
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-1536}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-256}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      # Prefer qwen2.5:3b on CPU; raise to 7B only when RAM/GPU allows.
      KNONIX_MODEL: ${KNONIX_MODEL:-qwen2.5:3b}
      KNONIX_CODING_MODEL: ${KNONIX_CODING_MODEL:-qwen2.5:3b}
      INFERENCE_MAX_OUTPUT_TOKENS: ${INFERENCE_MAX_OUTPUT_TOKENS:-512}
      KNONIX_WORKSPACES_ROOT: /var/knonix/workspaces
      # Optional install-wide PATs for Code workspace private clones
      KNONIX_GITHUB_TOKEN: ${KNONIX_GITHUB_TOKEN:-}
      KNONIX_GITLAB_TOKEN: ${KNONIX_GITLAB_TOKEN:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-${KNONIX_GITHUB_TOKEN:-}}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-${KNONIX_GITLAB_TOKEN:-}}
      # Auth UI reads these at runtime (OAuth buttons, signup confirmation copy).
      KNONIX_AUTH_MAILER_AUTOCONFIRM: ${KNONIX_AUTH_MAILER_AUTOCONFIRM:-true}
      KNONIX_AUTH_SMTP_HOST: ${KNONIX_AUTH_SMTP_HOST:-}
      KNONIX_AUTH_GOOGLE_ENABLED: ${KNONIX_AUTH_GOOGLE_ENABLED:-false}
      KNONIX_AUTH_AZURE_ENABLED: ${KNONIX_AUTH_AZURE_ENABLED:-false}
      # Microsoft 365 connectors (SharePoint, OneDrive, Outlook, Teams).
      KNONIX_CONNECTOR_ENCRYPTION_KEY: ${KNONIX_CONNECTOR_ENCRYPTION_KEY:-}
      KNONIX_MS_OAUTH_CLIENT_ID: ${KNONIX_MS_OAUTH_CLIENT_ID:-}
      KNONIX_MS_OAUTH_CLIENT_SECRET: ${KNONIX_MS_OAUTH_CLIENT_SECRET:-}
      KNONIX_MS_CLOUD_ENVIRONMENT: ${KNONIX_MS_CLOUD_ENVIRONMENT:-commercial}
      KNONIX_MS_TENANT_ID: ${KNONIX_MS_TENANT_ID:-}
      # Licensing / seats (customer default). Free tier = 1 user; extra users are paid.
      # Connected mode: OUTBOUND seat heartbeats to Knonix only (billing accuracy).
      # Customers never host fleet admin. PLATFORM_OWNER=true only on Knonix platform host.
      # See docs/PUBLIC_VS_PLATFORM.md
      KNONIX_LICENSE_MODE: ${KNONIX_LICENSE_MODE:-connected}
      KNONIX_FREE_SEATS: ${KNONIX_FREE_SEATS:-1}
      KNONIX_PLATFORM_OWNER: ${KNONIX_PLATFORM_OWNER:-false}
      KNONIX_LICENSE_KEY: ${KNONIX_LICENSE_KEY:-}
      KNONIX_INSTANCE_ID: ${KNONIX_INSTANCE_ID:-}
      KNONIX_LICENSE_SERVICE_URL: ${KNONIX_LICENSE_SERVICE_URL:-https://ai.knonix.com}
      KNONIX_LICENSE_SERVICE_TOKEN: ${KNONIX_LICENSE_SERVICE_TOKEN:-}
      KNONIX_LICENSE_TOKEN: ${KNONIX_LICENSE_TOKEN:-}
      KNONIX_LICENSE_PUBLIC_KEY: ${KNONIX_LICENSE_PUBLIC_KEY:-}
      # Shared secret for POST /api/knonix/heartbeat (used by heartbeat-cron).
      KNONIX_HEARTBEAT_SECRET: ${KNONIX_HEARTBEAT_SECRET:-}
      # Frontier APIs are OFF by default (enabling them sends data OUTSIDE your
      # boundary — non-sovereign).
      KNONIX_ALLOW_FRONTIER: ${KNONIX_ALLOW_FRONTIER:-false}
      KNONIX_RAG_ENABLED: ${KNONIX_RAG_ENABLED:-true}
      KNONIX_RAG_EMBED_MODEL: ${KNONIX_RAG_EMBED_MODEL:-nomic-embed-text}
      KNONIX_RAG_EMBED_DIM: ${KNONIX_RAG_EMBED_DIM:-768}
      # Redis auth: install.sh sets LOCAL_REDIS_URL=redis://:PASSWORD@redis:6379
      LOCAL_REDIS_URL: ${LOCAL_REDIS_URL:-redis://redis:6379}
      # Sampling (image lib_inference_settings reads these)
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.6}
      OLLAMA_TOP_P: ${OLLAMA_TOP_P:-0.9}
      OLLAMA_REPEAT_PENALTY: ${OLLAMA_REPEAT_PENALTY:-1.1}
      INFERENCE_TEMPERATURE: ${INFERENCE_TEMPERATURE:-${OLLAMA_TEMPERATURE:-0.6}}
      INFERENCE_TOP_P: ${INFERENCE_TOP_P:-${OLLAMA_TOP_P:-0.9}}
      INFERENCE_NUM_CTX: ${INFERENCE_NUM_CTX:-${OLLAMA_NUM_CTX:-1536}}
      SEARCH_API: ${SEARCH_API:-searxng}
      SEARXNG_API_URL: ${SEARXNG_API_URL:-http://searxng:8080}
    # Loopback only — Caddy reaches knonixai on the compose network by name.
    ports:
      - '127.0.0.1:${KNONIX_APP_PORT:-3000}:3000'
    volumes:
      - knonix_workspaces:/var/knonix/workspaces
      # Read-only host mount for "local folder" coding projects (paths under /host/…).
      - ${KNONIX_HOST_MOUNT:-/home/knonix}:/host:ro
      - ./scripts/knonix-entrypoint.sh:/knonix-scripts/knonix-entrypoint.sh:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/api/knonix/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"'
        ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_started
      ollama:
        condition: service_healthy

  # Sovereign local LLM runtime. Models run entirely inside your boundary.
  # After the first `up`, pull defaults with install.sh or:
  #   docker compose exec ollama ollama pull qwen2.5:3b
  #   docker compose exec ollama ollama pull nomic-embed-text
  # (or Admin → Models). NVIDIA GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Loopback only — Docker published ports bypass UFW; never expose the LLM API.
    ports:
      - '127.0.0.1:${OLLAMA_PORT:-11434}:11434'
    volumes:
      - ollama_data:/root/.ollama
    # CPU / Mac VM defaults: one model loaded, controlled concurrency.
    # On NVIDIA hosts, install.sh adds docker-compose.gpu.yml automatically.
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
      OLLAMA_NUM_THREAD: ${OLLAMA_NUM_THREAD:-8}
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knonixai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knonixai}
      POSTGRES_DB: ${POSTGRES_DB:-knonixai}
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
    # Loopback only (Docker bypasses UFW when binding 0.0.0.0).
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Pre-create the `auth` schema for GoTrue on first init (runs once, on an
      # empty data volume). Harmless when auth is disabled.
      - ./init-auth-db.sql:/docker-entrypoint-initdb.d/00-init-auth-db.sql:ro
      - ./init-rag-db.sql:/docker-entrypoint-initdb.d/01-init-rag-db.sql:ro
      # Optional TLS: scripts/gen-db-tls.sh → POSTGRES_SSL=true (certs in secrets/postgres-ssl)
      - ./secrets/postgres-ssl:/var/lib/postgresql/ssl:ro
    command:
      - /bin/bash
      - -c
      - |
        set -e
        if [ "$${POSTGRES_SSL:-false}" = "true" ] && [ -f /var/lib/postgresql/ssl/server.crt ]; then
          cp /var/lib/postgresql/ssl/server.crt /var/lib/postgresql/data/server.crt
          cp /var/lib/postgresql/ssl/server.key /var/lib/postgresql/data/server.key
          chown postgres:postgres /var/lib/postgresql/data/server.crt /var/lib/postgresql/data/server.key 2>/dev/null || true
          chmod 600 /var/lib/postgresql/data/server.key
          exec docker-entrypoint.sh postgres \
            -c ssl=on \
            -c ssl_cert_file=/var/lib/postgresql/data/server.crt \
            -c ssl_key_file=/var/lib/postgresql/data/server.key
        fi
        exec docker-entrypoint.sh postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-knonixai}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    # Loopback only; requirepass when REDIS_PASSWORD is set (install.sh generates one).
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --save 60 1000 --maxmemory-policy allkeys-lru --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes --save 60 1000 --maxmemory-policy allkeys-lru
        fi

  searxng:
    image: searxng/searxng
    restart: unless-stopped
    # Loopback only — app reaches SearXNG on the Docker network.
    ports:
      - '127.0.0.1:${SEARXNG_PORT:-8080}:8080'
    env_file: .env
    environment:
      # Substituted into settings.yml (secret_key). Generated by install.sh.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
      # Base URL SearXNG believes it is served at (kept internal by default).
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
    volumes:
      - searxng_data:/data
      # Enable JSON output + disable the bot limiter so the app's internal
      # search calls are not rejected with 403.
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

  # --- Self-hosted Supabase Auth (only started/used when ENABLE_AUTH=true) ---
  #
  # GoTrue is the Supabase Auth server. It reuses the Postgres above (auth
  # tables live in the `auth` schema) so identities never leave your boundary.
  # Local email/password + Google + Microsoft (Entra) sign-in all terminate
  # here. GoTrue runs its own DB migrations on first start.
  supabase-auth:
    image: supabase/gotrue:v2.177.0
    restart: unless-stopped
    # Only started when auth is enabled. install.sh passes `--profile auth`
    # automatically when ENABLE_AUTH=true; with auth off these services stay
    # down so they never crash-loop on missing keys.
    profiles: ['auth']
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: '9999'
      # Public URL of the auth API as seen by browsers/providers = Kong + /auth/v1.
      API_EXTERNAL_URL: ${KNONIX_AUTH_API_EXTERNAL_URL:-http://localhost:8000/auth/v1}
      GOTRUE_DB_DRIVER: postgres
      # search_path=auth,public: GoTrue queries unqualified table names (e.g.
      # identities) while migration state lives in public.schema_migrations.
      GOTRUE_DB_DATABASE_URL: postgres://${POSTGRES_USER:-knonixai}:${POSTGRES_PASSWORD:-knonixai}@postgres:5432/${POSTGRES_DB:-knonixai}?sslmode=disable&search_path=auth,public
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_MAILER_EXTERNAL_HOSTS: ${KNONIX_DOMAIN:-}
      # Where users land after auth; must match your app's public origin.
      GOTRUE_SITE_URL: ${KNONIX_AUTH_SITE_URL:-http://localhost:3000}
      # Comma-separated glob allow-list for post-auth redirects (OAuth callback).
      GOTRUE_URI_ALLOW_LIST: ${KNONIX_AUTH_ADDITIONAL_REDIRECT_URLS:-http://localhost:3000/**}
      GOTRUE_JWT_SECRET: ${KNONIX_AUTH_JWT_SECRET:-}
      GOTRUE_JWT_EXP: '3600'
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      # Email/password signups.
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${KNONIX_AUTH_ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_DISABLE_SIGNUP: ${KNONIX_AUTH_DISABLE_SIGNUP:-false}
      # Auto-confirm so accounts work WITHOUT wiring an SMTP server. Set to
      # false only after you configure the SMTP_* variables below.
      GOTRUE_MAILER_AUTOCONFIRM: ${KNONIX_AUTH_MAILER_AUTOCONFIRM:-true}
      # Optional in-boundary SMTP for real confirmation/recovery emails.
      GOTRUE_SMTP_ADMIN_EMAIL: ${KNONIX_AUTH_SMTP_ADMIN_EMAIL:-}
      GOTRUE_SMTP_HOST: ${KNONIX_AUTH_SMTP_HOST:-}
      # Must be a valid integer even when SMTP is unused (auto-confirm mode):
      # GoTrue parses this as an int and refuses to start on an empty string.
      GOTRUE_SMTP_PORT: ${KNONIX_AUTH_SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${KNONIX_AUTH_SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${KNONIX_AUTH_SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${KNONIX_AUTH_SMTP_SENDER_NAME:-KnonixAI}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      # Google Workspace sign-in.
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${KNONIX_AUTH_GOOGLE_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${KNONIX_AUTH_GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${KNONIX_AUTH_GOOGLE_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${KNONIX_AUTH_API_EXTERNAL_URL:-http://localhost:8000/auth/v1}/callback
      # Microsoft / Entra sign-in. AZURE_URL is the authority BASE only
      # (no /v2.0 suffix). GoTrue appends /oauth2/v2.0/authorize.
      # Commercial: https://login.microsoftonline.com/<tenant-or-common>
      # GCC High:    https://login.microsoftonline.us/<tenant-id>
      GOTRUE_EXTERNAL_AZURE_ENABLED: ${KNONIX_AUTH_AZURE_ENABLED:-false}
      GOTRUE_EXTERNAL_AZURE_CLIENT_ID: ${KNONIX_AUTH_AZURE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_AZURE_SECRET: ${KNONIX_AUTH_AZURE_SECRET:-}
      GOTRUE_EXTERNAL_AZURE_REDIRECT_URI: ${KNONIX_AUTH_API_EXTERNAL_URL:-http://localhost:8000/auth/v1}/callback
      GOTRUE_EXTERNAL_AZURE_URL: ${KNONIX_AUTH_AZURE_URL:-}
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:9999/health'
        ]
      timeout: 5s
      interval: 5s
      retries: 3

  # Kong API gateway. Fronts GoTrue with the Supabase URL shape
  # (`/auth/v1/*`) and validates the anon / service_role apikey. This service's
  # published port is what you put in NEXT_PUBLIC_SUPABASE_URL.
  supabase-kong:
    image: kong:2.8.1
    restart: unless-stopped
    profiles: ['auth']
    depends_on:
      supabase-auth:
        # Wait until GoTrue is up (after postgres healthy) so reboot is reliable
        condition: service_healthy
    # Loopback only — browsers use https://$DOMAIN/supabase via Caddy, not :8000.
    ports:
      - '127.0.0.1:${KNONIX_AUTH_KONG_HTTP_PORT:-8000}:8000'
      - '127.0.0.1:${KNONIX_AUTH_KONG_HTTPS_PORT:-8443}:8443'
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      # Injected into kong.yml (declarative config uses ${...} placeholders).
      SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SECRET_KEY:-}
    volumes:
      - ./kong.yml:/home/kong/temp.yml:ro
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'

  # Daily seat report to the central Knonix License Service (no PII).
  # Only for connected billing mode — not created in offline/gov air-gap installs.
  # install.sh adds --profile connected when KNONIX_LICENSE_MODE=connected.
  # Requires KNONIX_HEARTBEAT_SECRET (auto-generated by install.sh).
  heartbeat-cron:
    image: alpine:3.20
    restart: unless-stopped
    profiles: ['connected']
    depends_on:
      - knonixai
    environment:
      KNONIX_HEARTBEAT_SECRET: ${KNONIX_HEARTBEAT_SECRET:-}
      KNONIX_HEARTBEAT_URL: ${KNONIX_HEARTBEAT_URL:-http://knonixai:3000/api/knonix/heartbeat}
    volumes:
      - ./scripts/heartbeat-cron.sh:/scripts/heartbeat-cron.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$${KNONIX_HEARTBEAT_SECRET}" ]; then
          echo "[heartbeat-cron] KNONIX_HEARTBEAT_SECRET unset — seat reporting disabled."
          sleep infinity
        fi
        apk add --no-cache curl >/dev/null
        echo "[heartbeat-cron] started — heartbeat every 24h"
        # Fire once shortly after boot so new installs appear on the fleet board.
        sleep 90
        sh /scripts/heartbeat-cron.sh || true
        while true; do
          sleep 86400
          sh /scripts/heartbeat-cron.sh || true
        done

volumes:
  postgres_data:
  redis_data:
  searxng_data:
  ollama_data:
  knonix_workspaces:
