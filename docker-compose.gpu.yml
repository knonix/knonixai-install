# NVIDIA GPU acceleration for Ollama (P0-1).
# Included automatically by install.sh when nvidia-smi + nvidia container runtime work.
# Manual:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Requires: NVIDIA driver + nvidia-container-toolkit on the host.
# Not applicable on MacBook / nested VMs without GPU passthrough.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
